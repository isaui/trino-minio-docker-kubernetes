apiVersion: v1
kind: Secret
metadata:
  name: minio-cred
  namespace: dtd-datavisualization
type: Opaque
stringData:
  # Plain text values (Kubernetes will auto-encode to base64)
  accesskey: "minioadmin"
  secretkey: "minioadmin123"
---
apiVersion: v1
kind: Secret
metadata:
  name: metastore-db
  namespace: dtd-datavisualization
type: Opaque
stringData:
  # Plain text values (Kubernetes will auto-encode to base64)
  username: "hive"
  password: "hivepassword"
---
apiVersion: v1
kind: Secret
metadata:
  name: trino-auth
  namespace: dtd-datavisualization
type: Opaque
stringData:
  # Trino authentication untuk DDL seed job
  TRINO_USER: "admin"
  TRINO_PASSWORD: "your-admin-password"
  TRINO_HOST: "trino-cluster-trino"
  TRINO_PORT: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: trino-password-db
  namespace: dtd-datavisualization
type: Opaque
stringData:
  # Password file untuk Trino Web UI authentication
  # Format: username:password (plain text, one per line)
  # Trino will handle password processing automatically
  password.db: |
    admin:admin123
    isacitra:isasigma
    customer:customer123
