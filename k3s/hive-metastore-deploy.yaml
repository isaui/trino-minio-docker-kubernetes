apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: dtd-datavisualization
spec:
  selector: { app: hive-metastore }
  ports:
    - name: thrift
      port: 9083
      targetPort: 9083
---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore-staging
  namespace: dtd-datavisualization
spec:
  selector: { app: hive-metastore-staging }
  ports:
    - name: thrift
      port: 9084
      targetPort: 9083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: dtd-datavisualization
spec:
  replicas: 1
  selector: { matchLabels: { app: hive-metastore } }
  template:
    metadata:
      labels: { app: hive-metastore }
    spec:
      containers:
        - name: metastore
          image: localhost:5000/hive-metastore:latest
          ports: [{ containerPort: 9083, name: thrift }]
          env:
            # ---- MinIO (dipakai oleh generate_metastore_config.py) ----
            - name: MINIO_ENDPOINT
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_ENDPOINT } }
            - name: MINIO_WAREHOUSE_BUCKET
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_WAREHOUSE_BUCKET } }
            - name: MINIO_SSL_ENABLED
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_SSL_ENABLED } }
            - name: MINIO_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: minio-cred, key: accesskey } }
            - name: MINIO_SECRET_KEY
              valueFrom: { secretKeyRef: { name: minio-cred, key: secretkey } }
            # ---- Postgres HMS backend ----
            - name: POSTGRES_HOST
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: POSTGRES_HOST } }
            - name: POSTGRES_PORT
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: POSTGRES_PORT } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: metastore-db, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: metastore-db, key: password } }

            # (jaga-jaga kalau entrypointi nama lain)
            - name: METASTORE_DB_HOSTNAME
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: POSTGRES_HOST } }
            - name: METASTORE_PORT
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: METASTORE_PORT } }
            - name: ENVIRONMENT
              value: "production"
            - name: IS_RESUME
              value: "true"
          readinessProbe: { tcpSocket: { port: 9083 }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 9083 }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      # imagePullSecrets not needed for localhost:5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore-staging
  namespace: dtd-datavisualization
spec:
  replicas: 1
  selector: { matchLabels: { app: hive-metastore-staging } }
  template:
    metadata:
      labels: { app: hive-metastore-staging }
    spec:
      containers:
        - name: metastore-staging
          image: localhost:5000/hive-metastore:latest
          ports: [{ containerPort: 9083, name: thrift }]
          env:
            # ---- MinIO (dipakai oleh generate_metastore_config.py) ----
            - name: MINIO_ENDPOINT
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_ENDPOINT } }
            - name: MINIO_WAREHOUSE_BUCKET
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_WAREHOUSE_BUCKET } }
            - name: MINIO_STAGING_BUCKET
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_STAGING_BUCKET } }
            - name: MINIO_SSL_ENABLED
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_SSL_ENABLED } }
            - name: MINIO_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: minio-cred, key: accesskey } }
            - name: MINIO_SECRET_KEY
              valueFrom: { secretKeyRef: { name: minio-cred, key: secretkey } }
            # ---- Postgres HMS backend ----
            - name: POSTGRES_HOST
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: POSTGRES_HOST } }
            - name: POSTGRES_PORT
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: POSTGRES_PORT } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: metastore-db, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: metastore-db, key: password } }

            # (jaga-jaga kalau entrypointi nama lain)
            - name: METASTORE_DB_HOSTNAME
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: POSTGRES_HOST } }
            - name: METASTORE_STAGING_PORT
              valueFrom: { configMapKeyRef: { name: data-lake-config, key: METASTORE_STAGING_PORT } }
            - name: ENVIRONMENT
              value: "staging"
            - name: IS_RESUME
              value: "true"
          readinessProbe: { tcpSocket: { port: 9083 }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 9083 }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      # imagePullSecrets not needed for localhost:5000