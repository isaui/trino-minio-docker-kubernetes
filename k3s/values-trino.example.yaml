# values-trino.yaml

# === Environment variables (top-level for all pods) ===
env:
  - name: MINIO_ENDPOINT
    valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_ENDPOINT } }
  - name: MINIO_SSL_ENABLED
    valueFrom: { configMapKeyRef: { name: data-lake-config, key: MINIO_SSL_ENABLED } }
  - name: METASTORE_PORT
    valueFrom: { configMapKeyRef: { name: data-lake-config, key: METASTORE_PORT } }
  - name: MINIO_ACCESS_KEY
    valueFrom: { secretKeyRef: { name: minio-cred, key: accesskey } }
  - name: MINIO_SECRET_KEY
    valueFrom: { secretKeyRef: { name: minio-cred, key: secretkey } }

# === Catalog Hive (pakai ENV yang disuntik ke Pod) ===
additionalCatalogs:
  dtd_dw: |-
    connector.name=hive
    hive.metastore.uri=thrift://hive-metastore.dtd-datavisualization.svc.cluster.local:${ENV:METASTORE_PORT}
    fs.native-s3.enabled=true
    s3.endpoint=${ENV:MINIO_ENDPOINT}
    s3.path-style-access=true
    s3.aws-access-key=${ENV:MINIO_ACCESS_KEY}
    s3.aws-secret-key=${ENV:MINIO_SECRET_KEY}
    s3.region=us-east-1
    # (tidak perlu s3.ssl.enabled; pakai http/https di s3.endpoint saja)
  dtd_dw_staging: |-
    connector.name=hive
    hive.metastore.uri=thrift://hive-metastore-staging.dtd-datavisualization.svc.cluster.local:${ENV:METASTORE_STAGING_PORT}
    fs.native-s3.enabled=true
    s3.endpoint=${ENV:MINIO_ENDPOINT}
    s3.path-style-access=true
    s3.aws-access-key=${ENV:MINIO_ACCESS_KEY}
    s3.aws-secret-key=${ENV:MINIO_SECRET_KEY}
    s3.region=us-east-1

auth:
  passwordAuthSecret: "trino-password-db"

additionalPasswordAuthenticatorProperties:
  password-authenticator.properties: |-
    password-authenticator.name=file
    file.password-file=/etc/trino/auth/password/password.db

additionalConfigProperties:
  - "http-server.process-forwarded=true"
  - "http-server.authentication.allow-insecure-over-http=true"
  - "internal-communication.shared-secret=05f3f228368f1a68dbcc643add7d9fa61c24e74bc31311f846d6ff5df38fd617"

server:
  config:
    authenticationType: "PASSWORD"

coordinator:
  config:
    web-ui.authentication.type: "FORM"

worker:
  additionalConfigProperties:
    http-server.process-forwarded: "true"
