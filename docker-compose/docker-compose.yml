version: '3.7'
services:
  trino-init:
    build:
      context: .
      dockerfile: Dockerfile.init
    env_file:
      - .env
    volumes:
      - ./docker-vol/trino-config:/etc/trino/dynamic
      - ./docker-vol/catalog:/etc/trino/catalog
    networks:
      - trino-network

  trino-coordinator:
    image: 'trinodb/trino:latest'
    hostname: trino-coordinator
    ports:
      - '8080:8080'
    env_file:
      - .env
    volumes:
      - ./etc:/etc/trino
      - ./docker-vol/output:/opt/ddl
      - ./docker-vol/trino-config:/etc/trino/dynamic
      - ./docker-vol/catalog:/etc/trino/catalog
    depends_on:
      trino-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - trino-network

  postgres:
    image: 'postgres:11'
    hostname: postgres
    expose:
      - '5432'
    ports:
      - '5432:5432'
    env_file:
      - .env
    networks:
      - trino-network

  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile.hivemetastore
    hostname: hive-metastore
    ports:
      - '${METASTORE_PORT:-9083}:9083' # Thrift untuk Trino connection
    env_file:
      - .env
    environment:
      METASTORE_DB_HOSTNAME: ${POSTGRES_HOST:-postgres}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - trino-network

  ddl-seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    volumes:
      - ./docker-vol/output:/output
      - ./docker-vol/trino-config:/etc/trino/dynamic
    env_file:
      - .env
    depends_on:
      trino-coordinator:
        condition: service_healthy
    networks:
      - trino-network

networks:
  trino-network:
    driver: bridge
