apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trino-cluster-worker
  namespace: dtd-datavisualization
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trino-cluster-trino-worker
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70